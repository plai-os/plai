<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bubblegum Stampede</title>
  <style>
    :root {
      --ink: #211247;
      --deep: #2b0a65;
      --pink: #ff43ad;
      --yellow: #ffe95b;
      --mint: #60eadb;
      --panel: rgba(255, 255, 255, 0.15);
      --line: rgba(255, 255, 255, 0.24);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: white;
      background:
        radial-gradient(circle at 12% 12%, rgba(255, 233, 91, 0.24), transparent 18%),
        radial-gradient(circle at 86% 18%, rgba(96, 234, 219, 0.24), transparent 20%),
        linear-gradient(135deg, #3d087b 0%, #8527c6 52%, #ffb4e4 100%);
      overflow: hidden;
    }

    button { font: inherit; }

    .game-shell {
      min-height: 100vh;
      padding: clamp(14px, 2.4vw, 28px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
    }

    .meter-header,
    .reel-panel,
    .control-panel {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(43, 10, 101, 0.52);
      box-shadow: 0 20px 60px rgba(35, 7, 76, 0.26);
    }

    .meter-header {
      padding: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(110px, 1fr));
      gap: 10px;
      width: min(520px, 45vw);
    }

    .stat {
      min-height: 72px;
      padding: 12px;
      border-radius: 16px;
      background: var(--panel);
    }

    .stat span {
      display: block;
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 28px;
      line-height: 1;
    }

    .game-board {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 340px);
      gap: 16px;
    }

    .reel-panel {
      min-height: 0;
      padding: clamp(12px, 2vw, 22px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .message-strip {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 16px;
      background: var(--panel);
      font-size: clamp(17px, 2vw, 26px);
      font-weight: 950;
    }

    .multiplier {
      min-width: 86px;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--yellow);
      color: var(--ink);
      text-align: center;
      font-size: 15px;
      font-weight: 950;
    }

    .reel-grid {
      min-height: 390px;
      display: grid;
      grid-template-columns: repeat(5, minmax(72px, 1fr));
      grid-template-rows: repeat(4, minmax(66px, 1fr));
      gap: clamp(8px, 1.2vw, 12px);
      padding: clamp(10px, 1.6vw, 16px);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 22px;
      background: rgba(27, 5, 58, 0.74);
    }

    .symbol {
      display: grid;
      place-items: center;
      min-width: 0;
      border-radius: 18px;
      color: var(--ink);
      box-shadow: inset 0 -9px 0 rgba(0,0,0,0.1), 0 10px 22px rgba(28, 6, 65, 0.24);
      user-select: none;
    }

    .symbol svg {
      width: min(76%, 96px);
      height: min(76%, 96px);
      display: block;
      filter: drop-shadow(0 8px 8px rgba(24, 4, 43, 0.24));
    }

    .symbol.is-win { outline: 4px solid var(--yellow); transform: scale(1.04); }
    .gum { background: linear-gradient(135deg, #ff91d4, #ff43ad); }
    .pop { background: linear-gradient(135deg, #b47bff, #661bb4); color: #fff; }
    .coin { background: linear-gradient(135deg, #ffe95b, #ffb85a); }
    .mint { background: linear-gradient(135deg, #60eadb, #42bfff); }
    .wild { background: linear-gradient(135deg, #fff8a8, #ffe95b); }

    .control-panel {
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .control-panel h2 { margin: 0; font-size: 24px; }

    .bet-row {
      display: grid;
      grid-template-columns: 52px 1fr 52px;
      gap: 10px;
      align-items: center;
    }

    .round-btn,
    .spin-button {
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 950;
      box-shadow: 0 12px 24px rgba(43, 10, 101, 0.24);
    }

    .round-btn { min-height: 52px; background: rgba(255,255,255,0.92); color: var(--ink); font-size: 24px; }
    .bet-value { min-height: 52px; display: grid; place-items: center; border-radius: 16px; background: var(--panel); font-size: 24px; font-weight: 950; }
    .spin-button { min-height: 72px; background: linear-gradient(135deg, var(--yellow), #ffb64d); color: var(--ink); font-size: 28px; text-transform: uppercase; }
    .spin-button:disabled, .round-btn:disabled { opacity: 0.62; cursor: wait; }

    .feature-list { display: grid; gap: 10px; margin: 0; padding: 0; list-style: none; }
    .feature-list li { padding: 10px 12px; border-radius: 14px; background: var(--panel); color: rgba(255,255,255,0.86); font-size: 14px; font-weight: 750; }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .stats { width: 100%; grid-template-columns: repeat(3, 1fr); }
      .game-board { grid-template-columns: 1fr; }
      .reel-grid { min-height: 320px; grid-template-columns: repeat(5, minmax(52px, 1fr)); grid-template-rows: repeat(4, 58px); }
    }
  </style>
</head>
<body>
  <main class="game-shell" data-game="bubblegum-stampede">
    <header class="meter-header">
      <div class="stats" aria-label="Game meters">
        <div class="stat"><span>Balance</span><strong id="balanceValue">£1,000.00</strong></div>
        <div class="stat"><span>Last win</span><strong id="lastWinValue">£0.00</strong></div>
        <div class="stat"><span>Total won</span><strong id="totalWonValue">£0.00</strong></div>
      </div>
    </header>

    <section class="game-board">
      <section class="reel-panel" aria-label="Bubblegum Stampede reels">
        <div class="message-strip">
          <span id="statusMessage">Press Spin to start the stampede.</span>
          <span class="multiplier" id="cascadeMeter">x1</span>
        </div>
        <div class="reel-grid" id="reelGrid" aria-label="Five reels with four rows"></div>
      </section>

      <aside class="control-panel" aria-label="Game controls">
        <h2>Play controls</h2>
        <div class="bet-row">
          <button class="round-btn" id="betDown" type="button" aria-label="Decrease bet">-</button>
          <div class="bet-value" id="betValue">2</div>
          <button class="round-btn" id="betUp" type="button" aria-label="Increase bet">+</button>
        </div>
        <button class="spin-button" id="spinButton" type="button">Spin</button>
        <ul class="feature-list">
          <li>Three or more matching symbols pay from left to right.</li>
          <li>Wild symbols substitute on left-to-right paylines.</li>
          <li>Bonus stars trigger a bright free-spin tease.</li>
        </ul>
      </aside>
    </section>
  </main>

  <script>
    (() => {
      const symbols = [
        {
          id: "ele",
          name: "Bubblegum Elephant",
          className: "mint",
          weight: 4,
          pay: { 3: 4.55, 4: 18.18, 5: 81.81 },
          icon: '<svg viewBox="0 0 120 120" role="img" aria-label="Bubblegum Elephant"><circle cx="30" cy="58" r="22" fill="#d7e8ff"/><circle cx="90" cy="58" r="22" fill="#d7e8ff"/><ellipse cx="60" cy="62" rx="34" ry="30" fill="#f0f6ff"/><path d="M58 68c9 8 6 22-5 27" fill="none" stroke="#9eb8df" stroke-width="11" stroke-linecap="round"/><circle cx="48" cy="56" r="5" fill="#211247"/><circle cx="72" cy="56" r="5" fill="#211247"/><path d="M45 78c9 7 21 7 30 0" fill="none" stroke="#211247" stroke-width="5" stroke-linecap="round"/></svg>'
        },
        {
          id: "star",
          name: "Sugar Star",
          className: "wild",
          weight: 6,
          pay: { 3: 3.27, 4: 12.73, 5: 54.54 },
          icon: '<svg viewBox="0 0 120 120" role="img" aria-label="Sugar Star"><path d="M60 9 73 44l37 2-29 22 10 36-31-21-31 21 10-36-29-22 37-2Z" fill="#ffe95b" stroke="#fff7b0" stroke-width="7"/><circle cx="47" cy="57" r="5" fill="#211247"/><circle cx="73" cy="57" r="5" fill="#211247"/></svg>'
        },
        {
          id: "gum",
          name: "Bubblegum",
          className: "gum",
          weight: 14,
          pay: { 3: 1.09, 4: 4, 5: 16.36 },
          icon: '<svg viewBox="0 0 120 120" role="img" aria-label="Bubblegum"><circle cx="43" cy="62" r="28" fill="#ff8ed1"/><circle cx="74" cy="56" r="25" fill="#ff43ad"/><circle cx="61" cy="72" r="22" fill="#ffe95b"/><circle cx="78" cy="43" r="8" fill="#fff" opacity=".72"/></svg>'
        },
        {
          id: "mint",
          name: "Mint Swirl",
          className: "mint",
          weight: 22,
          pay: { 3: 0.82, 4: 2.73, 5: 10.91 },
          icon: '<svg viewBox="0 0 120 120" role="img" aria-label="Mint Swirl"><circle cx="60" cy="60" r="42" fill="#60eadb"/><path d="M60 18c23 18 25 52 1 83M102 60c-18 23-52 25-83 1" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round"/><circle cx="60" cy="60" r="18" fill="#37bfe8"/></svg>'
        },
        {
          id: "coin",
          name: "Candy Coin",
          className: "coin",
          weight: 22,
          pay: { 3: 0.82, 4: 2.73, 5: 10.91 },
          icon: '<svg viewBox="0 0 120 120" role="img" aria-label="Candy Coin"><circle cx="60" cy="60" r="42" fill="#ffe95b"/><circle cx="60" cy="60" r="29" fill="#ffb85a"/><path d="M45 62h30M60 42v38" stroke="#211247" stroke-width="9" stroke-linecap="round"/></svg>'
        },
        {
          id: "wild",
          name: "Walking Wild",
          className: "pop",
          weight: 2,
          wild: true,
          pay: {},
          icon: '<svg viewBox="0 0 120 120" role="img" aria-label="Walking Wild"><path d="M63 7 19 66h32l-9 47 58-68H67Z" fill="#ffe95b" stroke="#fff" stroke-width="7" stroke-linejoin="round"/><path d="M42 72h22" stroke="#211247" stroke-width="8" stroke-linecap="round"/></svg>'
        }
      ];
      const betSteps = [1, 2, 5, 10];
      const state = { balance: 1000, totalWon: 0, lastWin: 0, betIndex: 1, multiplier: 1, spinning: false };
      const grid = document.getElementById("reelGrid");
      const spinButton = document.getElementById("spinButton");
      const betDown = document.getElementById("betDown");
      const betUp = document.getElementById("betUp");
      const nodes = {
        balance: document.getElementById("balanceValue"),
        lastWin: document.getElementById("lastWinValue"),
        totalWon: document.getElementById("totalWonValue"),
        bet: document.getElementById("betValue"),
        message: document.getElementById("statusMessage"),
        meter: document.getElementById("cascadeMeter")
      };

      function bet() { return betSteps[state.betIndex]; }
      const weightedSymbols = symbols.flatMap((symbol) => Array.from({ length: symbol.weight }, () => symbol));
      function pickSymbol() { return weightedSymbols[Math.floor(Math.random() * weightedSymbols.length)]; }
      function format(value) { return String(Math.round(value)); }
      function money(value) { return new Intl.NumberFormat("en-GB", { style: "currency", currency: "GBP" }).format(value); }

      function makeGrid() {
        return Array.from({ length: 20 }, () => pickSymbol());
      }

      function render(cells, winning = []) {
        const wins = new Set(winning);
        grid.replaceChildren(...cells.map((symbol, index) => {
          const cell = document.createElement("div");
          cell.className = "symbol " + symbol.className + (wins.has(index) ? " is-win" : "");
          cell.setAttribute("aria-label", symbol.name);
          cell.innerHTML = symbol.icon;
          return cell;
        }));
      }

      function evaluate(cells) {
        const rows = [0, 1, 2, 3];
        let win = 0;
        const winning = [];
        rows.forEach((row) => {
          const indexes = [0, 1, 2, 3, 4].map((col) => row + col * 4);
          const line = indexes.map((index) => cells[index]);
          const first = line[0].wild ? line.find((symbol) => !symbol.wild) || line[0] : line[0];
          let count = 0;
          for (const symbol of line) {
            if (symbol.id === first.id || symbol.wild) {
              count += 1;
            } else {
              break;
            }
          }
          if (count >= 3) {
            const amount = (first.pay[count] || 0) * bet();
            win += amount;
            winning.push(...indexes.slice(0, count));
          }
        });
        return { win, winning };
      }

      function updateStats() {
        nodes.balance.textContent = money(state.balance);
        nodes.lastWin.textContent = money(state.lastWin);
        nodes.totalWon.textContent = money(state.totalWon);
        nodes.bet.textContent = format(bet());
        nodes.meter.textContent = "x" + state.multiplier;
      }

      function changeBet(delta) {
        if (state.spinning) return;
        state.betIndex = Math.max(0, Math.min(betSteps.length - 1, state.betIndex + delta));
        updateStats();
      }

      function spin() {
        if (state.spinning) return;
        state.spinning = true;
        spinButton.disabled = true;
        betDown.disabled = true;
        betUp.disabled = true;
        state.balance = Math.max(0, state.balance - bet());
        state.lastWin = 0;
        nodes.message.textContent = "Stampede spinning...";
        state.multiplier = 1;
        const cells = makeGrid();
        render(cells);
        window.setTimeout(() => {
          const result = evaluate(cells);
          state.lastWin = result.win;
          state.totalWon += result.win;
          state.balance += result.win;
          render(cells, result.winning);
          nodes.message.textContent = result.win > 0 ? "Payline win: " + money(result.win) : "No win this spin. Try again.";
          updateStats();
          state.spinning = false;
          spinButton.disabled = false;
          betDown.disabled = false;
          betUp.disabled = false;
        }, 260);
      }

      render(makeGrid());
      updateStats();
      spinButton.addEventListener("click", spin);
      betDown.addEventListener("click", () => changeBet(-1));
      betUp.addEventListener("click", () => changeBet(1));
      window.bubblegumStampedeTestApi = { makeGrid, evaluate, spin, state };
    })();
  </script>
</body>
</html>
