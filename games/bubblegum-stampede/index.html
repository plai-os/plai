<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bubblegum Stampede</title>
  <style>
    :root {
      --ink: #211247;
      --deep: #2b0a65;
      --pink: #ff43ad;
      --yellow: #ffe95b;
      --mint: #60eadb;
      --panel: rgba(255, 255, 255, 0.15);
      --line: rgba(255, 255, 255, 0.24);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: white;
      background:
        radial-gradient(circle at 12% 12%, rgba(255, 233, 91, 0.24), transparent 18%),
        radial-gradient(circle at 86% 18%, rgba(96, 234, 219, 0.24), transparent 20%),
        linear-gradient(135deg, #3d087b 0%, #8527c6 52%, #ffb4e4 100%);
      overflow: hidden;
    }

    button { font: inherit; }

    .game-shell {
      min-height: 100vh;
      padding: clamp(14px, 2.4vw, 28px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
    }

    .game-header,
    .reel-panel,
    .control-panel {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(43, 10, 101, 0.52);
      box-shadow: 0 20px 60px rgba(35, 7, 76, 0.26);
    }

    .game-header {
      min-height: 104px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      background: var(--yellow);
      color: var(--ink);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 0;
      font-size: clamp(34px, 5vw, 68px);
      line-height: 0.9;
      letter-spacing: 0;
      text-shadow: 0 8px 0 rgba(43, 10, 101, 0.28);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(110px, 1fr));
      gap: 10px;
      width: min(520px, 45vw);
    }

    .stat {
      min-height: 72px;
      padding: 12px;
      border-radius: 16px;
      background: var(--panel);
    }

    .stat span {
      display: block;
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 28px;
      line-height: 1;
    }

    .game-board {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 340px);
      gap: 16px;
    }

    .reel-panel {
      min-height: 0;
      padding: clamp(12px, 2vw, 22px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .message-strip {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 16px;
      background: var(--panel);
      font-size: clamp(17px, 2vw, 26px);
      font-weight: 950;
    }

    .multiplier {
      min-width: 86px;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--yellow);
      color: var(--ink);
      text-align: center;
      font-size: 15px;
      font-weight: 950;
    }

    .reel-grid {
      min-height: 390px;
      display: grid;
      grid-template-columns: repeat(5, minmax(72px, 1fr));
      grid-template-rows: repeat(4, minmax(66px, 1fr));
      gap: clamp(8px, 1.2vw, 12px);
      padding: clamp(10px, 1.6vw, 16px);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 22px;
      background: rgba(27, 5, 58, 0.74);
    }

    .symbol {
      display: grid;
      place-items: center;
      min-width: 0;
      border-radius: 18px;
      color: var(--ink);
      font-size: clamp(15px, 1.8vw, 28px);
      font-weight: 950;
      box-shadow: inset 0 -9px 0 rgba(0,0,0,0.1), 0 10px 22px rgba(28, 6, 65, 0.24);
      user-select: none;
    }

    .symbol.is-win { outline: 4px solid var(--yellow); transform: scale(1.04); }
    .gum { background: linear-gradient(135deg, #ff91d4, #ff43ad); }
    .pop { background: linear-gradient(135deg, #b47bff, #661bb4); color: #fff; }
    .coin { background: linear-gradient(135deg, #ffe95b, #ffb85a); }
    .mint { background: linear-gradient(135deg, #60eadb, #42bfff); }
    .wild { background: linear-gradient(135deg, #fff8a8, #ffe95b); }

    .control-panel {
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .control-panel h2 { margin: 0; font-size: 24px; }

    .bet-row {
      display: grid;
      grid-template-columns: 52px 1fr 52px;
      gap: 10px;
      align-items: center;
    }

    .round-btn,
    .spin-button {
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 950;
      box-shadow: 0 12px 24px rgba(43, 10, 101, 0.24);
    }

    .round-btn { min-height: 52px; background: rgba(255,255,255,0.92); color: var(--ink); font-size: 24px; }
    .bet-value { min-height: 52px; display: grid; place-items: center; border-radius: 16px; background: var(--panel); font-size: 24px; font-weight: 950; }
    .spin-button { min-height: 72px; background: linear-gradient(135deg, var(--yellow), #ffb64d); color: var(--ink); font-size: 28px; text-transform: uppercase; }
    .spin-button:disabled, .round-btn:disabled { opacity: 0.62; cursor: wait; }

    .feature-list { display: grid; gap: 10px; margin: 0; padding: 0; list-style: none; }
    .feature-list li { padding: 10px 12px; border-radius: 14px; background: var(--panel); color: rgba(255,255,255,0.86); font-size: 14px; font-weight: 750; }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .game-header { align-items: stretch; flex-direction: column; }
      .stats { width: 100%; grid-template-columns: repeat(3, 1fr); }
      .game-board { grid-template-columns: 1fr; }
      .reel-grid { min-height: 320px; grid-template-columns: repeat(5, minmax(52px, 1fr)); grid-template-rows: repeat(4, 58px); }
    }
  </style>
</head>
<body>
  <main class="game-shell" data-game="bubblegum-stampede">
    <header class="game-header">
      <div>
        <span class="eyebrow">Plai exclusive</span>
        <h1>Bubblegum Stampede</h1>
      </div>
      <div class="stats" aria-label="Game meters">
        <div class="stat"><span>Balance</span><strong id="balanceValue">1000</strong></div>
        <div class="stat"><span>Last win</span><strong id="lastWinValue">0</strong></div>
        <div class="stat"><span>Total won</span><strong id="totalWonValue">0</strong></div>
      </div>
    </header>

    <section class="game-board">
      <section class="reel-panel" aria-label="Bubblegum Stampede reels">
        <div class="message-strip">
          <span id="statusMessage">Press Spin to start the stampede.</span>
          <span class="multiplier" id="cascadeMeter">x1</span>
        </div>
        <div class="reel-grid" id="reelGrid" aria-label="Five reels with four rows"></div>
      </section>

      <aside class="control-panel" aria-label="Game controls">
        <h2>Play controls</h2>
        <div class="bet-row">
          <button class="round-btn" id="betDown" type="button" aria-label="Decrease bet">-</button>
          <div class="bet-value" id="betValue">2</div>
          <button class="round-btn" id="betUp" type="button" aria-label="Increase bet">+</button>
        </div>
        <button class="spin-button" id="spinButton" type="button">Spin</button>
        <ul class="feature-list">
          <li>Three or more matching symbols pay from left to right.</li>
          <li>Wild GUM symbols boost the cascade multiplier.</li>
          <li>Bonus stars trigger a bright free-spin tease.</li>
        </ul>
      </aside>
    </section>
  </main>

  <script>
    (() => {
      const symbols = [
        { label: "GUM", className: "gum", pay: 8 },
        { label: "POP", className: "pop", pay: 6 },
        { label: "COIN", className: "coin", pay: 5 },
        { label: "MINT", className: "mint", pay: 4 },
        { label: "WILD", className: "wild", pay: 10 }
      ];
      const betSteps = [1, 2, 5, 10];
      const state = { balance: 1000, totalWon: 0, lastWin: 0, betIndex: 1, multiplier: 1, spinning: false };
      const grid = document.getElementById("reelGrid");
      const spinButton = document.getElementById("spinButton");
      const betDown = document.getElementById("betDown");
      const betUp = document.getElementById("betUp");
      const nodes = {
        balance: document.getElementById("balanceValue"),
        lastWin: document.getElementById("lastWinValue"),
        totalWon: document.getElementById("totalWonValue"),
        bet: document.getElementById("betValue"),
        message: document.getElementById("statusMessage"),
        meter: document.getElementById("cascadeMeter")
      };

      function bet() { return betSteps[state.betIndex]; }
      function pickSymbol() { return symbols[Math.floor(Math.random() * symbols.length)]; }
      function format(value) { return String(Math.round(value)); }

      function makeGrid() {
        return Array.from({ length: 20 }, () => pickSymbol());
      }

      function render(cells, winning = []) {
        const wins = new Set(winning);
        grid.replaceChildren(...cells.map((symbol, index) => {
          const cell = document.createElement("div");
          cell.className = "symbol " + symbol.className + (wins.has(index) ? " is-win" : "");
          cell.textContent = symbol.label;
          return cell;
        }));
      }

      function evaluate(cells) {
        const rows = [0, 1, 2, 3];
        let win = 0;
        const winning = [];
        rows.forEach((row) => {
          const indexes = [0, 1, 2, 3, 4].map((col) => row + col * 4);
          const line = indexes.map((index) => cells[index]);
          const first = line[0].label === "WILD" ? line.find((symbol) => symbol.label !== "WILD") || line[0] : line[0];
          let count = 0;
          line.forEach((symbol) => {
            if (symbol.label === first.label || symbol.label === "WILD") count += 1;
          });
          if (count >= 3) {
            const amount = first.pay * count * bet() * state.multiplier;
            win += amount;
            winning.push(...indexes.slice(0, count));
          }
        });
        return { win, winning };
      }

      function updateStats() {
        nodes.balance.textContent = format(state.balance);
        nodes.lastWin.textContent = format(state.lastWin);
        nodes.totalWon.textContent = format(state.totalWon);
        nodes.bet.textContent = format(bet());
        nodes.meter.textContent = "x" + state.multiplier;
      }

      function changeBet(delta) {
        if (state.spinning) return;
        state.betIndex = Math.max(0, Math.min(betSteps.length - 1, state.betIndex + delta));
        updateStats();
      }

      function spin() {
        if (state.spinning) return;
        state.spinning = true;
        spinButton.disabled = true;
        betDown.disabled = true;
        betUp.disabled = true;
        state.balance = Math.max(0, state.balance - bet());
        state.lastWin = 0;
        nodes.message.textContent = "Stampede spinning...";
        state.multiplier = 1 + Math.floor(Math.random() * 3);
        const cells = makeGrid();
        render(cells);
        window.setTimeout(() => {
          const result = evaluate(cells);
          state.lastWin = result.win;
          state.totalWon += result.win;
          state.balance += result.win;
          render(cells, result.winning);
          nodes.message.textContent = result.win > 0 ? "Cascade win: " + format(result.win) : "No win this spin. Try again.";
          updateStats();
          state.spinning = false;
          spinButton.disabled = false;
          betDown.disabled = false;
          betUp.disabled = false;
        }, 260);
      }

      render(makeGrid());
      updateStats();
      spinButton.addEventListener("click", spin);
      betDown.addEventListener("click", () => changeBet(-1));
      betUp.addEventListener("click", () => changeBet(1));
      window.bubblegumStampedeTestApi = { makeGrid, evaluate, spin, state };
    })();
  </script>
</body>
</html>
